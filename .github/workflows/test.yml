name: e2e

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cucumber:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: test
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true          # caches gems, keyed on test/Gemfile.lock
          working-directory: test

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Cache the playwright npm package `npx` downloads.
      - name: Cache npm download
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-playwright-1.60.0

      # Cache the Chromium binary. On a hit, the installer skips the download
      # and we only pull the apt system libs (next step).
      - name: Cache Playwright browser
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-1.60.0

      - name: Install Playwright browser and system deps
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx -y playwright@1.60.0 install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx -y playwright@1.60.0 install-deps chromium

      - name: Run e2e suite
        run: ruby run.rb
