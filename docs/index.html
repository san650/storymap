<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Storymap</title>
  <meta name="description" content="Collaborative story mapping canvas" />
  <meta name="theme-color" content="#F2EBD9" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Storymap" />

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="./icon.svg" />
  <link rel="apple-touch-icon" href="./icon.svg" />

  <link rel="apple-touch-startup-image" href="./splash/splash-1290x2796.png"
        media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
  <link rel="apple-touch-startup-image" href="./splash/splash-1179x2556.png"
        media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
  <link rel="apple-touch-startup-image" href="./splash/splash-1284x2778.png"
        media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
  <link rel="apple-touch-startup-image" href="./splash/splash-1170x2532.png"
        media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
  <link rel="apple-touch-startup-image" href="./splash/splash-1125x2436.png"
        media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
  <link rel="apple-touch-startup-image" href="./splash/splash-1242x2688.png"
        media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
  <link rel="apple-touch-startup-image" href="./splash/splash-828x1792.png"
        media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
  <link rel="apple-touch-startup-image" href="./splash/splash-1242x2208.png"
        media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
  <link rel="apple-touch-startup-image" href="./splash/splash-750x1334.png"
        media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />

  <link rel="stylesheet" href="./fonts/fonts.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">
        <span class="bm bm-coral"></span>
        <span class="bm bm-amber"></span>
        <span class="bm bm-mint"></span>
      </span>
      <h1 class="title" contenteditable spellcheck="false" data-placeholder="Untitled Story Map">Untitled Story Map</h1>
      <span class="brand-sub">a story map workshop</span>
    </div>
    <div class="actions">
      <div class="history-group" role="group" aria-label="History">
        <button class="hist-btn" data-action="undo" type="button" title="Undo (⌘Z)" aria-label="Undo">
          <svg class="hist-ico" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M9 14 4 9l5-5" />
            <path d="M4 9h10.5a5.5 5.5 0 0 1 0 11H11" />
          </svg>
        </button>
        <button class="hist-btn" data-action="redo" type="button" title="Redo (⌘⇧Z)" aria-label="Redo">
          <svg class="hist-ico" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M15 14 20 9l-5-5" />
            <path d="M20 9H9.5a5.5 5.5 0 0 0 0 11H13" />
          </svg>
        </button>
      </div>
      <span class="actions-sep" aria-hidden="true"></span>
      <button class="btn" data-action="add-column" type="button">+ Column</button>
      <button class="btn btn-dark" data-action="add-release" type="button">+ Release line</button>
      <div class="kebab">
        <button class="btn btn-ghost btn-icon kebab-toggle" type="button" aria-haspopup="true" aria-expanded="false" aria-label="More actions" title="More actions">⋮</button>
        <div class="kebab-menu" role="menu" hidden>
          <button class="kebab-item" data-action="sessions" type="button" role="menuitem">Story maps…</button>
          <span class="kebab-sep" aria-hidden="true"></span>
          <button class="kebab-item" data-action="export" type="button" role="menuitem">Export…</button>
          <button class="kebab-item" data-action="import" type="button" role="menuitem">Import…</button>
          <span class="kebab-sep" aria-hidden="true"></span>
          <button class="kebab-item" data-action="show-log" type="button" role="menuitem">Activity log</button>
          <span class="kebab-sep" aria-hidden="true"></span>
          <button class="kebab-item kebab-item-danger" data-action="reset" type="button" role="menuitem">Restore example</button>
          <button class="kebab-item kebab-item-danger" data-action="clear" type="button" role="menuitem">Empty board</button>
        </div>
      </div>
    </div>
  </header>

  <div class="legend">
    <span class="chip chip-flow">User flow</span>
    <span class="chip chip-epic">Epic</span>
    <span class="chip chip-story">Story</span>
    <span class="legend-sep" aria-hidden="true">·</span>
    <span class="hint">Press <kbd>?</kbd> for shortcuts &amp; tips</span>
  </div>

  <div id="scroller" class="scroller">
    <div id="headers" class="headers"></div>
    <div id="canvas" class="canvas"></div>
  </div>

  <script type="module" src="./app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
      const sub = document.querySelector('.brand-sub');
      const base = sub ? sub.textContent : '';
      const showVersion = (sw) => {
        if (!sw || !sub) return;
        const ch = new MessageChannel();
        ch.port1.onmessage = (e) => { if (e.data) sub.textContent = `${base} · ${e.data}`; };
        sw.postMessage({ type: 'version' }, [ch.port2]);
      };
      // Don't hang the version off `controller`: right after the auto-reload
      // below, this page often starts uncontrolled (controller === null) and the
      // already-activated SW never fires another `controllerchange`, so the
      // version would silently vanish. `ready` resolves with the active
      // registration whether or not this page is controlled yet.
      navigator.serviceWorker.ready.then((reg) => showVersion(reg.active));
      navigator.serviceWorker.addEventListener('controllerchange', () =>
        showVersion(navigator.serviceWorker.controller));

      let reloadingForUpdate = false;
      const doReload = () => {
        if (reloadingForUpdate) return;
        reloadingForUpdate = true;
        location.reload();
      };
      navigator.serviceWorker.addEventListener('message', (e) => {
        if (!e.data || e.data.type !== 'RELOAD') return;
        // Don't yank the shell out from under an active text edit (commit-on-blur model).
        const el = document.activeElement;
        const editing = el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.isContentEditable);
        if (editing) {
          document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden') doReload();
          });
        } else {
          doReload();
        }
      });
    }
  </script>
</body>
</html>
